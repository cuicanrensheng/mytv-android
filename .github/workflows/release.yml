name: Release
on:
  workflow_dispatch:  # 允许手动触发
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle

      - name: Grant execute permission
        run: chmod +x ./gradlew

      - name: Build Debug APK (无签名)
        run: ./gradlew assembleDebug

      - name: Prepare artifacts
        run: |
          mkdir -p artifacts
          cp app/build/outputs/apk/debug/app-debug.apk artifacts/mytv-android-debug.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mytv-android-debug
          path: artifacts/*.apk
